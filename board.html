<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anonymous Board | PK Hwanter Corporation</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a href="index.html" class="brand" aria-label="PK Hwanter Corporation Home">
          <img class="brand-logo" src="assets/images/pkh-crop.jpg" alt="PK Hwanter Corporation logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';" />
          <div class="logo-fallback">PK</div>
          <div>
            <strong>PK Hwanter Corporation</strong>
            <p>PKH CORP</p>
          </div>
        </a>
        <div class="nav-actions">
          <button id="lang-toggle" class="lang-toggle" type="button" aria-label="Toggle language">한글</button>
          <button class="menu-toggle" aria-expanded="false" aria-controls="site-nav" data-i18n="menu">Menu</button>
        </div>
        <nav id="site-nav" class="site-nav">
          <a href="index.html" data-i18n="nav.home">Home</a>
          <a href="company.html" data-i18n="nav.company">Company</a>
          <a href="board.html" class="active" data-i18n="nav.board">Board</a>
        </nav>
      </div>
    </header>

    <main class="container section">
      <h1 data-i18n="board.title">Anonymous Board</h1>
      <p data-i18n="board.desc">Temporary board powered by LocalStorage. Use as a skeleton before backend DB integration.</p>

      <form id="post-form" class="board-form">
        <label for="post-content" data-i18n="board.form.label">Message</label>
        <textarea id="post-content" name="content" rows="4" maxlength="500" data-i18n-placeholder="board.form.placeholder" placeholder="Leave an anonymous message (max 500 chars)" required></textarea>
        <div class="form-row">
          <button type="submit" class="btn primary" data-i18n="board.form.submit">Post</button>
          <button type="button" id="clear-posts" class="btn danger" data-i18n="board.form.clear">Clear All</button>
        </div>
      </form>

      <section class="section">
        <h2 data-i18n="board.list.title">Posts</h2>
        <ul id="post-list" class="post-list"></ul>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>© <span id="year"></span> PK Hwanter Corporation (PKH CORP). All rights reserved.</p>
      </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/board.js"></script>
  </body>
</html>
